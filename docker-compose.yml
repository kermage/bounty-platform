services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bounty_user
      POSTGRES_PASSWORD: bounty_pass
      POSTGRES_DB: bounty_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  pgdata:
